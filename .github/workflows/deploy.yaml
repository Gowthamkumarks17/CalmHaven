name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      #  Step 2: Show files (debug step)
      - name: List files
        run: ls -R

      #  Step 3: Build backend Docker image
      - name: Build Backend Image
        run: |
          docker build -t calmhaven-backend ./Backend

          